name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web_mcp_cli/pnpm-lock.yaml

      - name: Build extension
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-extension.ps1

      - name: Pack release
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $zipName = "cursor-toolbox-$tag.zip"
          $rootDir = "cursor-toolbox-$tag"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          if (Test-Path $rootDir) { Remove-Item $rootDir -Recurse -Force }
          New-Item -ItemType Directory -Path $rootDir | Out-Null
          Copy-Item -Path release\* -Destination $rootDir -Recurse -Force
          Compress-Archive -Path $rootDir -DestinationPath $zipName
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
